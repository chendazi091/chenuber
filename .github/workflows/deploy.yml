# 部署靜態內容到 GitHub Pages
name: Deploy static content to Pages

on:
  # 在推送到預設分支時觸發
  push:
    branches: ['main']

  # 允許從 Actions 標籤手動執行此工作流程
  workflow_dispatch:

# 設定 GITHUB_TOKEN 的權限以允許部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允許一個並發部署，跳過執行中和剛提交的排隊部署。
# 但是，不要取消執行中的部署，因為我們希望這些生產部署能完成。
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 單一部署工作
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 這裡設定 Vite 的預設建置輸出目錄 (dist)
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
